<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- UNIFIED THEME: Brighter Tiffany Green/Teal -->
    <linearGradient id="themeDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" /> <!-- Brighter Teal -->
      <stop offset="100%" stop-color="#2DD4BF" /> <!-- Bright Tiffany/Cyan -->
    </linearGradient>

    <!-- Document Body: Pure white -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    
    <!-- Folded Corner -->
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Spectrum Gradient: Blending all supported format colors -->
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E11D48" />
      <stop offset="20%" stop-color="#F97316" />
      <stop offset="40%" stop-color="#EAB308" />
      <stop offset="60%" stop-color="#4ADE80" />
      <stop offset="80%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <clipPath id="docClip">
      <path d="M 80 0 L 420 0 L 560 140 L 560 700 C 560 744.18 524.18 780 480 780 L 80 780 C 35.82 780 0 744.18 0 700 L 0 80 C 0 35.82 35.82 0 80 0 Z" />
    </clipPath>

    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#134E4A" flood-opacity="0.15" />
    </filter>
    
    <filter id="foldShadow">
      <feDropShadow dx="-6" dy="6" stdDeviation="6" flood-color="#134E4A" flood-opacity="0.1" />
    </filter>

    <filter id="playShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#134E4A" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background App Icon Base -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#themeDark)" />

  <g transform="translate(232, 122)">
    <!-- Document Body -->
    <path d="M 80 0 L 420 0 L 560 140 L 560 700 C 560 744.18 524.18 780 480 780 L 80 780 C 35.82 780 0 744.18 0 700 L 0 80 C 0 35.82 35.82 0 80 0 Z" fill="url(#docGrad)" filter="url(#shadow)" />
    
    <!-- Spectrum Stripes -->
    <g clip-path="url(#docClip)">
      <g transform="translate(0, 220) rotate(-45)">
        <rect x="-300" y="0" width="1000" height="24" fill="url(#spectrumGrad)" />
        <rect x="-300" y="44" width="1000" height="24" fill="url(#spectrumGrad)" />
        <rect x="-300" y="88" width="1000" height="24" fill="url(#spectrumGrad)" />
      </g>
    </g>

    <!-- Play Button (Unified Dark Theme) -->
    <path d="M 210 240 L 410 370 L 210 500 Z" fill="url(#themeDark)" stroke="url(#themeDark)" stroke-width="32" stroke-linejoin="round" filter="url(#playShadow)" />
    
    <!-- Code-style "random" horizontal lines to indicate documentation/code -->
    <g fill="none" stroke="#14B8A6" stroke-width="14" stroke-linecap="round">
      <!-- Line 1 -->
      <path d="M 140 560 L 240 560" />
      <path d="M 260 560 L 380 560" />
      <!-- Line 2 -->
      <path d="M 140 600 L 180 600" />
      <path d="M 200 600 L 360 600" />
      <path d="M 380 600 L 420 600" />
      <!-- Line 3 (Indented) -->
      <path d="M 180 640 L 280 640" />
      <path d="M 300 640 L 360 640" />
      <!-- Line 4 (Indented) -->
      <path d="M 180 680 L 220 680" />
      <path d="M 240 680 L 400 680" />
      <!-- Line 5 -->
      <path d="M 140 720 L 300 720" />
    </g>

    <!-- Folded Corner -->
    <path d="M 420 0 L 420 120 C 420 131.05 428.95 140 440 140 L 560 140 Z" fill="url(#foldGrad)" filter="url(#foldShadow)" />
  </g>
</svg>
